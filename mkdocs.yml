site_name: YSimulator Documentation
site_description: A distributed social media simulation system using Ray for orchestration and LLM-based agent behaviors
site_author: YSocialTwin Team
site_url: https://ysocialtwin.github.io/YSimulator/

repo_name: YSocialTwin/YSimulator
repo_url: https://github.com/YSocialTwin/YSimulator

# Copyright
copyright: Copyright &copy; 2024 YSocialTwin Team

# Theme configuration
theme:
  name: material
  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

# Extensions
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

# Plugins
plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"/]+|(?!\b)(?=[A-Z][a-z])|\.(?!\d)|&[lg]t;'

# Navigation structure
nav:
  - Home: index.md

  - Installation & Setup:
      - Configuration Overview: configuration/README.md
      - Complete Configuration Guide: configuration/CONFIG.md
      - vLLM Integration: configuration/VLLM_INTEGRATION_GUIDE.md

  - Core Concepts:
      - Agents & Populations: agents/README.md
      - Agent Types: agents/AGENT_TYPES.md
      - Agent Actions: agents/AGENT_ACTIONS.md
      - Temporal Activities: agents/AGENT_TEMPORAL_ACTIVITIES.md
      - Interests & Topics: features/INTERESTS.md
      - Opinion Dynamics: features/OPINION_DYNAMICS.md

  - System Architecture:
      - Architecture Overview: architecture/ARCHITECTURE.md
      - System Diagrams: architecture/DIAGRAMS.md
      - Simulation Orchestrator: architecture/SIMULATION_ORCHESTRATOR.md
      - Coordination Layer: architecture/COORDINATION_LAYER.md
      - Action Processor Framework: architecture/ACTION_PROCESSOR_FRAMEWORK.md
      - Recommendation Engine: architecture/RECOMMENDATION_ENGINE.md
      - Opinion Dynamics Handler: architecture/OPINION_DYNAMICS_HANDLER.md
      - LLM Utilities Layer: architecture/LLM_UTILITIES_LAYER.md
      - Repository Pattern: architecture/REPOSITORY_PATTERN.md
      - Service Integration: architecture/SERVICE_INTEGRATION.md

  - Features & Modules:
      - Semantic Memory Subsystem: features/MEMORY_SUBSYSTEM.md
      - Recommendation Systems: features/RECOMMENDATION_SYSTEMS.md
      - Opinion Dynamics Architecture: features/OPINION_DYNAMICS_ARCHITECTURE.md
      - Annotation System: features/ANNOTATION_IMPLEMENTATION.md
      - vLLM Batch Inference: features/VLLM_BATCH_INFERENCE.md
      - vLLM Integration Summary: features/VLLM_INTEGRATION_SUMMARY.md
      - vLLM Final Report: features/VLLM_FINAL_REPORT.md

  - Data & Storage:
      - Redis Overview: data-storage/REDIS_INTEGRATION.md
      - Redis for Recsys: data-storage/REDIS_RECOMMENDATION_SYSTEMS.md
      - Redis Coverage Analysis: data-storage/REDIS_COVERAGE_ANALYSIS.md

  - Development & Extending:
      - Extending YSimulator: development/EXTENDING.md
      - Adding Actions: development/ADDING_ACTIONS_GUIDE.md
      - Adding Recommendation Systems: development/ADDING_RECSYS_GUIDE.md
      - Adding Agent Knowledge Graphs: development/ADDING_AGENT_KNOWLEDGE_GRAPHS_GUIDE.md
      - Adding Moderator Agent: development/ADDING_MODERATOR_AGENT_GUIDE.md
      - Code Formatting: development/FORMATTING.md
      - Codebase Analysis: development/CODEBASE_ANALYSIS.md

  - Operations & Logging:
      - Logging Configuration: logging/LOGGING_CONFIG.md
      - Server Logging: logging/SERVER_LOGGING.md
      - Action Logging: logging/ACTION_LOGGING.md



# Extra settings
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/YSocialTwin/YSimulator
  version:
    provider: mike
